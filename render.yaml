services:
  - type: web
    name: kidstube-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && export PYTHONPATH=$PYTHONPATH:$(pwd) && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
